# ================================================================
# DevOps Radar — GitHub Pages Deploy Workflow
# Ana branch'e her push'ta siteyi otomatik deploy eder
# ================================================================

name: 🚀 GitHub Pages Deploy

on:
  push:
    branches: [main]
  
  # Manual trigger
  workflow_dispatch:

# GitHub Pages için gerekli izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir deploy çalışsın
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ GitHub Pages Yapılandır
        uses: actions/configure-pages@v5

      - name: 📤 Artifact Yükle
        uses: actions/upload-pages-artifact@v3
        with:
          # Tüm repo'yu deploy et (build adımı yok, static site)
          path: '.'

      - name: 🚀 GitHub Pages Deploy
        id: deployment
        uses: actions/deploy-pages@v4
